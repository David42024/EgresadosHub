# DigitalOcean App Platform Specification
# Para deployar: doctl apps create --spec .do/app.yaml
# o subir a GitHub y conectar en DigitalOcean Dashboard

name: egresados-platform
region: nyc1

# ─── Base de Datos PostgreSQL ──────────────────────────────────────────────
databases:
  - name: egresados-db
    engine: PG
    version: "16"
    size: db-s-dev-database  # Plan básico, cambiar a db-s-1vcpu-1gb para producción
    num_nodes: 1

# ─── Servicios ───────────────────────────────────────────────────────────────
services:
  # Backend API (NestJS)
  - name: egresados-api
    github:
      repo: David42024/EgresadosHub
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/api/Dockerfile
    dockerfile_target: production
    source_dir: .
    instance_count: 1
    instance_size_slug: basic-xs  # Cambiar a basic-xs para producción
    http_port: 8080
    health_check:
      http_path: /health
      timeout_seconds: 10
      port: 8080
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        value: ${egresados-db.DATABASE_URL}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
        scope: RUN_TIME
      - key: JWT_REFRESH_SECRET
        value: ${JWT_REFRESH_SECRET}
        scope: RUN_TIME
      - key: API_INTERNAL_URL
        value: http://egresados-api:8080
      - key: CORS_ORIGIN
        value: ${egresados-web.PUBLIC_URL}  # URL pública del frontend
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
        type: SECRET
      - key: CLOUDINARY_API_KEY
        value: ""
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        value: ""
        type: SECRET
      # ─── OAuth Google ──────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        value: ""
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        value: ""
        type: SECRET
      # ─── OAuth GitHub ──────────────────────────────────────────────────────
      - key: GITHUB_CLIENT_ID
        value: ""
        type: SECRET
      - key: GITHUB_CLIENT_SECRET
        value: ""
        type: SECRET

  # Frontend Web (Next.js)
  - name: egresados-web
    github:
      repo: David42024/EgresadosHub
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/web/Dockerfile
    dockerfile_target: production
    source_dir: .
    instance_count: 1
    instance_size_slug: basic-xs
    http_port: 3000
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: ${egresados-api.PUBLIC_URL}  # URL pública del API
      - key: API_INTERNAL_URL
        value: http://egresados-api:8080  # Comunicación interna entre servicios

# ─── Ingress (Enrutamiento de tráfico) ───────────────────────────────────────
ingress:
  rules:
    # API (NestJS) - Sirve las API en /api (más específico, va primero)
    - component:
        name: egresados-api
      match:
        path:
          prefix: /api
    # Web (Next.js) - Sirve el frontend en la raíz
    - component:
        name: egresados-web
      match:
        path:
          prefix: /

# ─── Información de dominios ─────────────────────────────────────────────────
domains: []
