name: CI/CD - Build, Lint & Deploy to DigitalOcean

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Quality Checks (Lint & Type Check)
  # ─────────────────────────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

  # ─────────────────────────────────────────────────────────────
  # 2. Build Applications
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Apps
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@repo/*" build

      - name: Build API
        run: pnpm --filter "@repo/api" build
        env:
          NODE_ENV: production

      - name: Build Web
        run: pnpm --filter "@repo/web" build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/web/.next
            packages/*/dist

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to DigitalOcean App Platform (Production)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: |
          envsubst '$CLOUDINARY_CLOUD_NAME $CLOUDINARY_API_KEY $CLOUDINARY_API_SECRET $GOOGLE_CLIENT_ID $GOOGLE_CLIENT_SECRET $GITHUB_CLIENT_ID $GITHUB_CLIENT_SECRET $UPLOADTHING_TOKEN' < .do/app.yaml > .do/app.yaml.tmp
          mv .do/app.yaml.tmp .do/app.yaml
          doctl apps update ${{ secrets.DIGITALOCEAN_APP_ID }} --spec .do/app.yaml --wait

      - name: Notify deployment success
        if: success()
        run: echo "✅ Deployment to DigitalOcean successful!"

  # ─────────────────────────────────────────────────────────────
  # 4. Smoke Tests (Post-Deploy)
  # ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Health Check API
        run: |
          API_URL="${{ secrets.DO_API_URL }}"
          if [ -z "$API_URL" ]; then
            echo "⚠️ DO_API_URL secret is not set. Using fallback or skipping."
            # Si no hay secreto, no podemos hacer el curl a un host inexistente
            exit 0
          fi
          # Asegurar que el path incluya el prefijo global api/v1
          curl -f "https://$API_URL/api/v1/health" || exit 1

      - name: Health Check Web
        run: |
          WEB_URL="${{ secrets.DO_WEB_URL }}"
          if [ -z "$WEB_URL" ]; then
            echo "⚠️ DO_WEB_URL secret is not set. Skipping."
            exit 0
          fi
          curl -f "https://$WEB_URL" || exit 1
